<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>משחק המניות — ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Full-screen slide layout ── */
    html, body { height: 100%; overflow: hidden; margin: 0; }

    .admin-wrap {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px 16px;
      gap: 8px;
      overflow: hidden;
      max-width: 100%;
    }

    /* ── Top bar: logo + year + buttons + QR ── */
    .admin-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      border-radius: 12px;
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .admin-logo {
      font-family: 'Rubik', sans-serif;
      font-size: 17px; font-weight: 900; color: white;
      white-space: nowrap;
    }

    .admin-year-badge {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px; padding: 4px 14px;
      color: white; font-size: 14px; font-weight: 700;
      white-space: nowrap;
    }

    .admin-btns {
      display: flex; gap: 6px; flex-wrap: nowrap; align-items: center;
    }

    .abtn {
      padding: 7px 14px; border: none; border-radius: 8px;
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .abtn-primary   { background: white; color: var(--primary); }
    .abtn-primary:hover { background: var(--card2); }
    .abtn-secondary { background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.3); }
    .abtn-secondary:hover { background: rgba(255,255,255,.25); }
    .abtn-danger    { background: rgba(220,38,38,.2); color: #fca5a5; border: 1px solid rgba(220,38,38,.3); }
    .abtn:disabled  { opacity: .4; cursor: not-allowed; }

    .pilot-badge {
      background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3);
      color: white; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; white-space: nowrap;
    }

    /* QR inline in topbar */
    .qr-inline {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px; padding: 6px 10px;
      margin-right: auto;
    }
    .qr-inline img { width: 52px; height: 52px; border-radius: 6px; }
    .qr-inline-text { color: white; font-size: 11px; line-height: 1.4; }
    .qr-inline-text strong { font-size: 13px; display: block; }

    /* ── Main content area ── */
    .admin-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Company cards row ── */
    #adminIntroView, #adminYearView, #adminEndView {
      flex-shrink: 0;
    }

    .admin-companies {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .co-card {
      background: var(--card); border-radius: 12px; padding: 12px 14px;
      border: 1px solid var(--brd); box-shadow: 0 2px 8px var(--shadow);
      border-top: 4px solid var(--primary);
    }
    .co-card.nova  { border-top-color: #7c3aed; }
    .co-card.prime { border-top-color: #059669; }
    .co-card.fast  { border-top-color: #c026d3; }

    .co-name  { font-family: 'Rubik', sans-serif; font-size: 17px; font-weight: 900; color: var(--txt); margin-bottom: 4px; }
    .co-story { font-size: 12px; color: var(--txt2); line-height: 1.5; margin-bottom: 8px; }

    .co-fins-intro { display: flex; gap: 6px; margin-bottom: 8px; }
    .fin-box  { flex: 1; background: var(--card2); border-radius: 6px; padding: 5px 8px; text-align: center; }
    .fin-lbl  { font-size: 9px; color: var(--txt3); font-weight: 700; margin-bottom: 1px; }
    .fin-val  { font-size: 13px; font-weight: 800; color: var(--txt); }
    .fin-val.neg { color: var(--red); }
    .fin-val.pos { color: var(--green); }

    .co-stats { display: flex; flex-direction: column; gap: 4px; }
    .co-stat  { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--txt2); }
    .co-stat-label { font-weight: 700; color: var(--txt); min-width: 110px; }
    .rating-dots { display: flex; gap: 3px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--brd2); }
    .dot.filled { background: var(--primary); }
    .co-price {
      display: inline-block; background: var(--card2);
      color: var(--primary); font-size: 12px; font-weight: 800;
      padding: 4px 10px; border-radius: 6px; margin-top: 8px;
    }

    /* ── Year cards ── */
    #yearCards {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .admin-co-block {
      border-radius: 10px; border: 1px solid var(--brd);
      box-shadow: 0 2px 8px var(--shadow); overflow: hidden;
    }

    .co-row {
      background: var(--card); padding: 10px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .co-row-left  { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .co-row-icon  { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .co-row-name  { font-family: 'Rubik', sans-serif; font-size: 16px; font-weight: 800; color: var(--txt); }
    .co-row-fins  { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--txt3); margin-top: 2px; }
    .co-fin-item  { color: var(--txt2); }
    .co-fin-item.pos strong { color: var(--green); }
    .co-fin-item.neg strong { color: var(--red); }
    .co-fin-sep   { color: var(--brd2); }
    .co-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; margin-right: 8px; }
    .co-row-price { font-family: 'Rubik', sans-serif; font-size: 16px; font-weight: 900; color: var(--txt); direction: ltr; }
    .ret-badge    { font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .ret-up       { background: #d1fae5; color: #059669; }
    .ret-down     { background: #fee2e2; color: #dc2626; }
    .ret-flat     { background: var(--card2); color: var(--txt3); }

    .admin-news-row {
      background: var(--card2); padding: 7px 12px;
      font-size: 13px; color: var(--txt2); line-height: 1.4;
      border-top: 1px solid var(--brd);
    }
    .news-tag {
      font-size: 9px; font-weight: 700; color: var(--txt3);
      letter-spacing: .5px; text-transform: uppercase; margin-left: 6px;
    }

    /* ── End view leaderboard ── */
    .leaderboard {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 12px;
    }
    .lb-card {
      background: var(--card); border-radius: 10px; padding: 12px 10px;
      border: 1px solid var(--brd); text-align: center;
      border-top: 3px solid var(--brd);
    }
    .lb-card.r1 { border-top-color: #d97706; }
    .lb-card.r2 { border-top-color: #9ca3af; }
    .lb-card.r3 { border-top-color: #b45309; }
    .lb-rank    { font-size: 10px; color: var(--txt3); margin-bottom: 3px; font-weight: 700; }
    .lb-emoji   { font-size: 22px; margin-bottom: 2px; }
    .lb-name    { font-size: 12px; font-weight: 700; color: var(--txt); margin-bottom: 2px; }
    .lb-value   { font-family: 'Rubik', sans-serif; font-size: 14px; font-weight: 900; color: var(--primary); }
    .lb-pct     { font-size: 11px; font-weight: 600; margin-top: 1px; }
    .lb-pct.pos { color: var(--green); }
    .lb-pct.neg { color: var(--red); }

    .insight-card {
      background: var(--card); border: 1px solid var(--brd2);
      border-radius: 12px; padding: 12px 16px;
    }
    .insight-icon { font-size: 20px; margin-bottom: 4px; }
    .insight-text { font-size: 13px; color: var(--txt2); line-height: 1.6; }

    /* ── Players section ── */
    .admin-players-section {
      background: var(--card); border-radius: 12px; padding: 10px 14px;
      border: 1px solid var(--brd); box-shadow: 0 2px 8px var(--shadow);
      flex-shrink: 0;
    }
    .section-title { font-size: 11px; font-weight: 700; color: var(--txt3); margin-bottom: 8px; letter-spacing: .5px; }

    .players-grid {
      display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px;
    }

    .p-tile {
      text-align: center; padding: 5px 2px 4px;
      border-radius: 8px; background: var(--card2);
      border: 1px solid var(--brd); transition: all .3s;
      position: relative;
    }
    .p-tile.active  { background: #ede9fe; border-color: var(--brd2); }
    .p-tile.waiting { background: linear-gradient(135deg, #ede9fe, #fce7f3); border-color: var(--accent); }
    .p-tile.empty   { opacity: .3; }

    .p-emoji  { font-size: 16px; line-height: 1; margin-bottom: 1px; }
    .p-num    { font-size: 10px; font-weight: 800; color: var(--txt); }
    .p-val    { font-size: 8px; color: var(--txt3); font-weight: 600; }

    .waiting-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--pink));
      border-radius: 0 0 4px 4px; display: none;
    }
    .p-tile.waiting .waiting-bar { display: block; }
    .ready-count { display: none; }

    /* ── Animations ── */
    @keyframes fiu { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pls  { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
<div class="bgp"></div>
<div class="admin-wrap">

  <!-- TOP BAR -->
  <div class="admin-topbar">
    <div class="admin-logo">📈 משחק המניות</div>
    <div class="admin-year-badge" id="yearBadge">שלב מבוא</div>
    <span id="pilotBadge" class="pilot-badge" style="display:none">ניסיון</span>
    <div class="admin-btns">
      <button class="abtn abtn-primary"   id="btnStart"  >▶ התחל ניסיון</button>
      <button class="abtn abtn-primary"   id="btnNext"   disabled>שנה הבאה ←</button>
      <button class="abtn abtn-secondary" id="btnEnd"    style="display:none">🏁 סיום</button>
      <button class="abtn abtn-secondary" id="btnRefresh">↺</button>
      <button class="abtn abtn-danger"    id="btnReset"  >🗑</button>
    </div>
    <!-- QR inline -->
    <div class="qr-inline">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=104x104&data=https://stock-noise-game.onrender.com" alt="QR"/>
      <div class="qr-inline-text">
        <strong>סרקו להצטרף</strong>
        stock-noise-game.onrender.com
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="admin-main">

    <!-- INTRO VIEW -->
    <div id="adminIntroView">
      <div class="admin-companies" id="introCards"></div>
    </div>

    <!-- YEAR VIEW -->
    <div id="adminYearView" style="display:none">
      <div id="yearCards"></div>
    </div>

    <!-- END VIEW -->
    <div id="adminEndView" style="display:none">
      <div class="leaderboard" id="leaderboard"></div>
      <div class="insight-card">
        <div class="insight-icon">💡</div>
        <div class="insight-text">"חדשות יכולות להפחיד או להלהיב – אבל הן לא תמיד משקפות את איכות העסק. משקיעה טובה לומדת להבדיל בין רעש לבין שינוי אמיתי."</div>
      </div>
    </div>

    <!-- PLAYERS -->
    <div class="admin-players-section" id="playersSection">
      <div class="section-title">שחקנים מחוברים</div>
      <div class="players-grid" id="playersGrid"></div>
      <div class="ready-count" id="readyCount"></div>
    </div>

  </div>
</div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
<script>
  (function() {
    const grid = document.getElementById("playersGrid");
    for (let i = 1; i <= MAX_PLAYERS; i++) {
      grid.innerHTML += `
        <div class="p-tile empty" id="ptile-${i}">
          <div class="p-emoji">○</div>
          <div class="p-num">${i}</div>
          <div class="p-val"></div>
          <div class="waiting-bar"></div>
        </div>`;
    }
  })();
</script>
</body>
</html>
