<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>משחק המניות — ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#f5f0ff; --card:#fff; --card2:#f0ebff;
      --primary:#6d28d9; --pink:#c026d3; --accent:#a855f7;
      --green:#059669; --red:#dc2626; --gold:#d97706;
      --txt:#1e1035; --txt2:#4b3d72; --txt3:#7c6fa8;
      --brd:#e5d9ff; --brd2:#c4b5fd; --shadow:rgba(109,40,217,.12);
    }
    html, body { height:100%; overflow:hidden; background:var(--bg);
      font-family:'Heebo',sans-serif; direction:rtl; color:var(--txt); }

    .wrap {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      padding: 14px 20px;
      gap: 12px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      border-radius: 14px; padding: 12px 20px;
    }
    .tlogo { font-family:'Rubik',sans-serif; font-size:22px; font-weight:900; color:white; white-space:nowrap; }
    .tyear {
      background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3);
      border-radius:20px; padding:6px 18px; color:white; font-size:18px; font-weight:700; white-space:nowrap;
    }
    .tpilot {
      background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3);
      color:white; font-size:13px; font-weight:700; padding:4px 12px; border-radius:20px; white-space:nowrap;
    }
    .tbtns { display:flex; gap:8px; align-items:center; }
    .abtn {
      padding:9px 18px; border:none; border-radius:8px;
      font-family:'Heebo',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; transition:all .2s; white-space:nowrap;
    }
    .abtn-primary { background:white; color:var(--primary); }
    .abtn-primary:hover { background:var(--card2); }
    .abtn-secondary { background:rgba(255,255,255,.15); color:white; border:1px solid rgba(255,255,255,.3); }
    .abtn-secondary:hover { background:rgba(255,255,255,.25); }
    .abtn-danger { background:rgba(220,38,38,.2); color:#fca5a5; border:1px solid rgba(220,38,38,.3); }
    .abtn:disabled { opacity:.4; cursor:not-allowed; }

    /* QR pushed to the left */
    .tqr { margin-right:auto; display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
      border-radius:12px; padding:8px 14px; }
    .tqr img { width:80px; height:80px; border-radius:8px; flex-shrink:0; }
    .tqr-txt { color:white; }
    .tqr-txt strong { font-size:16px; display:block; margin-bottom:3px; }
    .tqr-txt span { font-size:12px; opacity:.8; }

    /* ── MIDDLE: companies + players ── */
    .middle {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 12px;
      min-height: 0;
    }

    /* Companies area */
    .companies-area {
      display: flex; flex-direction: column; gap: 10px; min-height:0; overflow:hidden;
    }

    /* Intro: 3 cards side by side */
    .intro-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap:12px; flex:1;
    }

    .co-card {
      background:var(--card); border-radius:14px; padding:18px 16px;
      border:1px solid var(--brd); box-shadow:0 2px 12px var(--shadow);
      border-top:5px solid var(--primary);
      display:flex; flex-direction:column; gap:8px;
    }
    .co-card.nova  { border-top-color:#7c3aed; }
    .co-card.prime { border-top-color:#059669; }
    .co-card.fast  { border-top-color:#c026d3; }

    .co-name { font-family:'Rubik',sans-serif; font-size:22px; font-weight:900; color:var(--txt); }
    .co-story { font-size:14px; color:var(--txt2); line-height:1.6; flex:1; }

    .co-fins { display:flex; gap:8px; }
    .fin-box { flex:1; background:var(--card2); border-radius:8px; padding:8px; text-align:center; }
    .fin-lbl { font-size:10px; color:var(--txt3); font-weight:700; margin-bottom:2px; }
    .fin-val { font-size:15px; font-weight:800; color:var(--txt); }
    .fin-val.neg { color:var(--red); }
    .fin-val.pos { color:var(--green); }

    .co-stats { display:flex; flex-direction:column; gap:5px; }
    .co-stat { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--txt2); }
    .co-stat-label { font-weight:700; color:var(--txt); min-width:120px; }
    .rating-dots { display:flex; gap:4px; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--brd2); }
    .dot.filled { background:var(--primary); }
    .co-price {
      display:inline-block; background:var(--card2); color:var(--primary);
      font-size:14px; font-weight:800; padding:5px 12px; border-radius:8px;
    }

    /* Year view: 3 cards */
    .year-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px; flex:1;
    }

    .yr-card {
      background:var(--card); border-radius:14px; padding:16px;
      border:1px solid var(--brd); box-shadow:0 2px 12px var(--shadow);
      display:flex; flex-direction:column; gap:10px;
    }

    .yr-header { display:flex; justify-content:space-between; align-items:flex-start; }
    .yr-name { font-family:'Rubik',sans-serif; font-size:20px; font-weight:900; color:var(--txt); }
    .yr-price-block { text-align:left; }
    .yr-price { font-family:'Rubik',sans-serif; font-size:24px; font-weight:900; color:var(--txt); direction:ltr; }
    .yr-price-lbl { font-size:10px; color:var(--txt3); font-weight:700; text-align:left; }
    .ret-badge { font-size:13px; font-weight:700; padding:3px 9px; border-radius:7px; display:inline-block; margin-top:3px; }
    .ret-up   { background:#d1fae5; color:#059669; }
    .ret-down { background:#fee2e2; color:#dc2626; }
    .ret-flat { background:var(--card2); color:var(--txt3); }

    .news-label { font-size:10px; font-weight:700; color:var(--txt3); letter-spacing:.5px; text-transform:uppercase; margin-bottom:3px; }
    .news-bar {
      background:var(--card2); border-right:3px solid var(--primary);
      padding:10px 12px; border-radius:0 8px 8px 0;
      font-size:14px; font-weight:600; color:var(--txt); line-height:1.5; flex:1;
    }

    /* End view */
    .end-view { display:flex; flex-direction:column; gap:12px; flex:1; }
    .podium { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; flex:1; }
    .podium-card {
      background:var(--card); border-radius:16px; padding:24px 16px;
      border:1px solid var(--brd); text-align:center;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 20px var(--shadow);
    }
    .podium-card.r1 { border-top:5px solid var(--gold); background:linear-gradient(135deg,#fffbeb,#fff); }
    .podium-card.r2 { border-top:5px solid #9ca3af; }
    .podium-card.r3 { border-top:5px solid #b45309; }
    .podium-medal { font-size:48px; }
    .podium-emoji { font-size:36px; }
    .podium-name  { font-family:'Rubik',sans-serif; font-size:18px; font-weight:800; color:var(--txt); }
    .podium-val   { font-family:'Rubik',sans-serif; font-size:28px; font-weight:900; color:var(--primary); }
    .podium-pct   { font-size:16px; font-weight:700; }
    .podium-pct.pos { color:var(--green); }
    .podium-pct.neg { color:var(--red); }

    .insight-card {
      background:var(--card); border:1px solid var(--brd2); border-radius:12px; padding:14px 18px;
    }
    .insight-text { font-size:15px; color:var(--txt2); line-height:1.7; }

    /* ── PLAYERS PANEL (right column) ── */
    .players-panel {
      background:var(--card); border-radius:14px; padding:12px;
      border:1px solid var(--brd); box-shadow:0 2px 12px var(--shadow);
      display:flex; flex-direction:column; gap:6px; min-height:0;
    }
    .panel-title { font-size:12px; font-weight:700; color:var(--txt3); letter-spacing:.5px; }

    .pgrid {
      display:grid; grid-template-columns:repeat(4,1fr); gap:5px; flex:1;
    }

    .ptile {
      text-align:center; padding:6px 3px 5px;
      border-radius:8px; background:var(--card2);
      border:1px solid var(--brd); transition:all .3s; position:relative;
    }
    .ptile.active  { background:#ede9fe; border-color:var(--brd2); }
    .ptile.waiting { background:linear-gradient(135deg,#ede9fe,#fce7f3); border-color:var(--accent); }
    .ptile.empty   { opacity:.3; }
    .pt-emoji { font-size:18px; line-height:1; margin-bottom:2px; }
    .pt-num   { font-size:11px; font-weight:800; color:var(--txt); }
    .pt-val   { font-size:9px; color:var(--txt3); font-weight:600; margin-top:1px; }
    .wbar {
      position:absolute; bottom:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--primary),var(--pink));
      border-radius:0 0 4px 4px; display:none;
    }
    .ptile.waiting .wbar { display:block; }

    @keyframes fiu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tlogo">📈 משחק המניות</div>
    <div class="tyear" id="yearBadge">שלב מבוא</div>
    <span id="pilotBadge" class="tpilot" style="display:none">ניסיון</span>
    <div class="tbtns">
      <button class="abtn abtn-primary"   id="btnStart">▶ התחל ניסיון</button>
      <button class="abtn abtn-primary"   id="btnNext" disabled>שנה הבאה ←</button>
      <button class="abtn abtn-secondary" id="btnEnd"  style="display:none">🏁 סיום משחק</button>
      <button class="abtn abtn-secondary" id="btnRefresh">↺</button>
      <button class="abtn abtn-danger"    id="btnReset">🗑</button>
    </div>
    <div class="tqr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://stock-noise-game.onrender.com" alt="QR"/>
      <div class="tqr-txt">
        <strong>סרקו להצטרף</strong>
        <span>stock-noise-game.onrender.com</span>
      </div>
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="middle">

    <div class="companies-area">
      <!-- INTRO -->
      <div id="adminIntroView">
        <div class="intro-grid" id="introCards"></div>
      </div>
      <!-- YEAR -->
      <div id="adminYearView" style="display:none">
        <div class="year-grid" id="yearCards"></div>
      </div>
      <!-- END -->
      <div id="adminEndView" style="display:none">
        <div class="end-view">
          <div class="podium" id="leaderboard"></div>
          <div class="insight-card">
            <div class="insight-text">💡 "חדשות יכולות להפחיד או להלהיב – אבל הן לא תמיד משקפות את איכות העסק. משקיעה טובה לומדת להבדיל בין רעש לבין שינוי אמיתי."</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PLAYERS PANEL -->
    <div class="players-panel">
      <div class="panel-title">שחקנים</div>
      <div class="pgrid" id="playersGrid"></div>
    </div>

  </div>

</div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
<script>
  (function() {
    const grid = document.getElementById("playersGrid");
    for (let i = 1; i <= MAX_PLAYERS; i++) {
      grid.innerHTML += `
        <div class="ptile empty" id="ptile-${i}">
          <div class="pt-emoji">○</div>
          <div class="pt-num">${i}</div>
          <div class="pt-val"></div>
          <div class="wbar"></div>
        </div>`;
    }
  })();
</script>
</body>
</html>
