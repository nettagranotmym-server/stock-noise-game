<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק המניות – ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== ADMIN SCREEN ===== -->
<div id="screen-admin" class="screen active">
  <div class="admin-header">
    <div class="admin-logo">משחק<span>המניות</span></div>
    <div id="adminYearBadge" class="admin-year-badge">שלב מבוא</div>
    <div class="admin-controls">
      <div id="adminPilot" class="pilot-badge">ניסיון</div>
      <button class="btn-admin btn-admin-secondary" id="btnAdminStart" onclick="adminStartGame()">▶ התחל משחק</button>
      <button class="btn-admin btn-admin-primary"   id="btnAdminNext"  onclick="adminNextYear()" disabled>שנה הבאה ←</button>
      <button class="btn-admin btn-admin-secondary" id="btnAdminEnd"   onclick="adminShowEnd()" style="display:none">📊 סיכום</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- INTRO VIEW -->
    <div class="admin-intro-view" id="adminIntroView">
      <div class="admin-intro" id="adminIntroCards"></div>
    </div>

    <!-- YEAR VIEW -->
    <div class="admin-year-view" id="adminYearView">
      <div class="year-companies-row" id="adminYearCards"></div>
    </div>

    <!-- END VIEW -->
    <div class="admin-end-view" id="adminEndView">
      <div class="leaderboard-grid" id="adminLeaderboard"></div>
      <div class="insight-card insight-card--light">
        <div class="insight-icon">💡</div>
        <div class="insight-text insight-text--dark">
          "חדשות יכולות להפחיד או להלהיב – אבל הן לא תמיד משקפות את איכות העסק.
          משקיעה טובה לומדת להבדיל בין רעש לבין שינוי אמיתי."
        </div>
      </div>
    </div>

    <!-- PLAYERS SECTION -->
    <div class="players-section" id="playersSection">
      <div class="players-section-title">שחקנים מחוברים</div>
      <div class="players-grid-admin" id="adminPlayersGrid"></div>
      <div class="ready-count" id="readyCount">0 / 0 מוכנים</div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/admin.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
