<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>משחק המניות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="bgp"></div>
<div class="ct">

  <!-- LOGIN -->
  <div class="sc ws on" id="scrLogin">
    <div class="wt">משחק המניות 📈</div>
    <div class="tsa">
      <div class="tsl">בחר/י את המספר שלך:</div>
      <div class="tg" id="playerGrid"></div>
      <button class="sbtn" id="startBtn">כניסה למשחק ➡️</button>
    </div>
    <div class="brand-footer">אפליקציה מבית <span>SHEvyon</span></div>
  </div>

  <!-- GAME -->
  <div class="sc" id="scrGame">
    <div class="gh">
      <div class="gtn" id="gTeam"></div>
      <div class="gbal">
        <div class="gbs">שווי תיק</div>
        <div class="gbv" id="gBal">₪10,000</div>
      </div>
    </div>
    <div id="gContent"></div>
  </div>

  <!-- RESULTS -->
  <div class="sc rs" id="scrResults">
    <div class="rh">
      <div style="font-size:48px" id="rTrophy">🏆</div>
      <div class="rtt">המשחק הסתיים!</div>
      <div class="rts" id="rTeam"></div>
    </div>
    <div class="fc">
      <div class="fl">שווי תיק סופי</div>
      <div class="fa" id="rAmount"></div>
      <div class="fr" id="rReturn"></div>
    </div>
    <div class="det" id="rDetails"></div>
    <div class="insight-card">
      <div class="insight-icon">💡</div>
      <div class="insight-text">
        חדשות יכולות להפחיד או להלהיב – אבל הן לא תמיד משקפות את איכות העסק.
        משקיעה טובה לומדת להבדיל בין רעש לבין שינוי אמיתי.
      </div>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button class="rbtn" id="restartBtn">שחק/י שוב 🔄</button>
    </div>
    <div class="brand-footer">אפליקציה מבית <span>SHEvyon</span></div>
  </div>

</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
